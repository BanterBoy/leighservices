name: Build & Deploy — Production

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build & Deploy to Production
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://leigh-services.com

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install build dependencies
        run: npm ci

      - name: Compile SCSS
        run: npm run build:sass

      - name: Compile Tailwind
        run: npm run build:tailwind

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: .

      - name: Deploy to GitHub Pages (production)
        id: deploy
        uses: actions/deploy-pages@v5

      - name: Create release tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v1.$(date +'%Y.%m.%d')"
          # Append a counter if the tag already exists today
          COUNTER=1
          FINAL_TAG=$TAG
          while git rev-parse "$FINAL_TAG" >/dev/null 2>&1; do
            FINAL_TAG="${TAG}-${COUNTER}"
            COUNTER=$((COUNTER + 1))
          done
          git tag "$FINAL_TAG"
          git push origin "$FINAL_TAG"
          gh release create "$FINAL_TAG" \
            --title "Release $FINAL_TAG" \
            --generate-notes \
            --repo ${{ github.repository }}

  submit-indexnow:
    name: Submit URLs to IndexNow
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: build-and-deploy
    steps:
      - name: Submit all pages to IndexNow
        run: |
          STATUS="$(curl -sS -o /dev/null -w '%{http_code}' \
            -X POST "https://api.indexnow.org/IndexNow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d '{
              "host": "leigh-services.com",
              "key": "d8dec56125d3bc36231d3517b959e55a",
              "keyLocation": "https://leigh-services.com/d8dec56125d3bc36231d3517b959e55a.txt",
              "urlList": [
                "https://leigh-services.com/",
                "https://leigh-services.com/services.html",
                "https://leigh-services.com/team.html",
                "https://leigh-services.com/case-studies.html",
                "https://leigh-services.com/testimonials.html",
                "https://leigh-services.com/blog.html",
                "https://leigh-services.com/contact.html",
                "https://leigh-services.com/certifications.html"
              ]
            }')" || { echo "IndexNow submission request failed"; exit 1; }

          if [[ ! "$STATUS" =~ ^2 ]]; then
            echo "IndexNow submission returned HTTP $STATUS"
            exit 1
          fi
