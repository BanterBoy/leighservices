name: Build & Deploy — Production

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build & Deploy to Production
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://leigh-services.com

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Sass
        run: npm install -g sass

      - name: Compile SCSS
        run: sass assets/sass/main.scss assets/css/main.css --style=compressed --no-source-map

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: .

      - name: Deploy to GitHub Pages (production)
        id: deploy
        uses: actions/deploy-pages@v5

      - name: Create release tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v1.$(date +'%Y.%m.%d')"
          # Append a counter if the tag already exists today
          COUNTER=1
          FINAL_TAG=$TAG
          while git rev-parse "$FINAL_TAG" >/dev/null 2>&1; do
            FINAL_TAG="${TAG}-${COUNTER}"
            COUNTER=$((COUNTER + 1))
          done
          git tag "$FINAL_TAG"
          git push origin "$FINAL_TAG"
          gh release create "$FINAL_TAG" \
            --title "Release $FINAL_TAG" \
            --generate-notes \
            --repo ${{ github.repository }}
